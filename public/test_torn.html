<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Torn Paper Test</title>
  <style>
    body { background: #333; margin: 0; }
    .video-container {
      width: 100%;
      height: 400px;
      background: #000;
      position: relative;
      overflow: hidden;
    }
    .torn-edge {
      position: absolute;
      bottom: -10px; /* Hide bottom flat edge */
      left: -5%;
      width: 110%;
      height: 40px;
      background: #e2dfd8;
      filter: url(#torn-paper);
    }
  </style>
</head>
<body>
  <div class="video-container">
    <div style="color: white; padding: 20px;">Video Area</div>
    <div class="torn-edge"></div>
  </div>
  <div style="height: 400px; background: #e2dfd8;">
    Content Area
  </div>

  <svg width="0" height="0" style="position: absolute;">
    <filter id="torn-paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.1" numOctaves="5" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="15" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>
</body>
</html>
